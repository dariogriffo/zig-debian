name: Build zig for Debian

on:
  workflow_dispatch:
    inputs:
      zig_stable_version:
        description: The stable version of zig to build.
        type: string
        required: true
      zig_oldstable_version:
        description: The old stable version of zig to build (optional).
        type: string
        required: false
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: The target architecture.
        type: choice
        required: true
        default: all
        options:
          - all
          - amd64
          - arm64
          - armel
          - riscv64
          - ppc64el
          - i386
          - loong64
          - s390x

permissions:
  contents: write

jobs:
  build-zig:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zig-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.zig_stable_version }}

      - name: Build zig stable (Debian)
        run: ./build_zig_stable_debian.sh ${{ inputs.zig_stable_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Build zig stable (Ubuntu)
        run: ./build_zig_stable_ubuntu.sh ${{ inputs.zig_stable_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Build zig oldstable (Debian)
        if: ${{ inputs.zig_oldstable_version != '' }}
        run: ./build_zig_oldstable_debian.sh ${{ inputs.zig_oldstable_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Build zig oldstable (Ubuntu)
        if: ${{ inputs.zig_oldstable_version != '' }}
        run: ./build_zig_oldstable_ubuntu.sh ${{ inputs.zig_oldstable_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            zig_*.deb
            zig-stable_*.deb
            zig-oldstable_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zig-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.zig_stable_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            zig-stable_*.dsc
            zig-stable_*.orig.tar.gz
            zig-stable_*.debian.tar.xz

  release-zig:
    name: Release zig for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-zig, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            zig_*.deb
            zig-stable_*.deb
            zig-oldstable_*.deb
            zig-stable_*.dsc
            zig-stable_*.orig.tar.gz
            zig-stable_*.debian.tar.xz
          name: ${{ inputs.zig_stable_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.zig_stable_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
