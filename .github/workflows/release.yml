name: Build zig for Debian

on:
  workflow_dispatch:
    inputs:
      zig_version:
        description: The version of zig to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-zig:
    name: Build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout zig-debian
        uses: actions/checkout@v4

      - name: Build zig
        run: ./build_zig_debian.sh ${{ inputs.zig_version }} ${{ inputs.build_version }} ${{ matrix.arch }}
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.arch }}
          path:  |
            zig-zero_*.deb
            zig_*.deb


  release-zig:
    name: (Draft-)Release zig for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-zig
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Publish Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files:  |
            zig-zero_*.deb
            zig_*.deb
          name: ${{ inputs.zig_version }}+${{ inputs.build_version }}
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true

